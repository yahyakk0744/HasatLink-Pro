name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/android/**'
      - 'frontend/capacitor.config.ts'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build web
        run: cd frontend && npm run build

      - name: Sync Capacitor Android
        run: cd frontend && npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > frontend/android/hasatlink-release.keystore

      - name: Build release AAB
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasatlink-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
