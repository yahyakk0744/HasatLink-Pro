services:
  - type: web
    name: hasatlink-api
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: AGROMONITORING_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_KEY
        sync: false
      - key: PUSHER_SECRET
        sync: false
      - key: PUSHER_CLUSTER
        sync: false
      - key: CORS_ORIGIN
        value: https://hasatlink.com,https://www.hasatlink.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: HF_ACCESS_TOKEN
        sync: false
