workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: HasatLink
    environment:
      vars:
        BUNDLE_ID: "com.hasatlink.app"
        APP_STORE_APPLE_ID: "6761334964"
      node: 22
      xcode: latest
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update || pod install
      - name: Build web
        script: |
          cd frontend
          echo "VITE_API_URL=https://hasatlink-api.onrender.com/api" > .env.production
          echo "VITE_SOCKET_URL=https://hasatlink-api.onrender.com" >> .env.production
          npm run build
      - name: Capacitor sync
        script: |
          cd frontend
          npx cap sync ios
      - name: Increment build number
        script: |
          cd frontend
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 0) + 1))
        working_directory: ios/App
      - name: Set up code signing
        script: |
          cd frontend
          xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Build IPA
        script: |
          cd frontend
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: true
      email:
        recipients:
          - yahyakk0744@gmail.com
        notify:
          success: true
          failure: true
